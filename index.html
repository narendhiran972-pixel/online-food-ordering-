<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Food Paradise</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#fff5ec,#ffe4d6);
    color:#333;
}

/* HEADER */

header{
    background:linear-gradient(90deg,#ff512f,#dd2476);
    color:white;
    text-align:center;
    padding:30px;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
}

header h1{
    font-size:40px;
    margin-bottom:8px;
}

header p{
    opacity:.9;
}

/* CONTAINER */

.container{
    width:90%;
    max-width:1200px;
    margin:40px auto;
}

.title{
    margin-bottom:20px;
    color:#222;
}

/* MENU */

.menu{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

/* CARD */

.card{
    background:rgba(255,255,255,.8);
    backdrop-filter:blur(8px);

    border-radius:20px;

    padding:25px;

    text-align:center;

    box-shadow:0 10px 25px rgba(0,0,0,.12);

    transition:.4s;

    animation:fadeUp .8s;
}

.card:hover{

    transform:translateY(-10px);

    box-shadow:0 18px 35px rgba(0,0,0,.25);

}

.food-icon{

    font-size:55px;

    color:#ff5722;

    margin-bottom:15px;

}

.card h3{

    margin-bottom:10px;

}

.card p{

    color:#ff5722;

    font-size:22px;

    font-weight:600;

    margin-bottom:15px;

}

.card label{

    display:block;

    margin-bottom:10px;

    font-weight:500;

}

.qty{

    width:100%;

}

/* FORM */

.form{

    background:white;

    margin-top:20px;

    padding:25px;

    border-radius:20px;

    box-shadow:0 10px 25px rgba(0,0,0,.1);

}

input,
textarea{

    width:100%;

    padding:14px;

    margin:12px 0;

    border-radius:10px;

    border:2px solid #ddd;

    font-size:16px;

    transition:.3s;

}

input:focus,
textarea:focus{

    border-color:#ff512f;

    outline:none;

    box-shadow:0 0 12px rgba(255,81,47,.3);

}

textarea{

    resize:none;

    height:120px;

}

/* BUTTON */

button{

    background:linear-gradient(45deg,#ff512f,#dd2476);

    color:white;

    border:none;

    padding:15px 30px;

    font-size:18px;

    border-radius:40px;

    cursor:pointer;

    transition:.4s;

}

button:hover{

    transform:scale(1.08);

    box-shadow:0 10px 20px rgba(0,0,0,.2);

}

/* SUMMARY */

#summary{

    margin-top:20px;

    background:white;

    padding:25px;

    border-radius:20px;

    border-left:8px solid #ff5722;

    box-shadow:0 10px 25px rgba(0,0,0,.12);

    font-size:18px;

    line-height:2;

    white-space:pre-line;

}

/* ANIMATION */

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

/* MOBILE */

@media(max-width:768px){

header h1{

font-size:28px;

}

.menu{

grid-template-columns:1fr;

}

button{

width:100%;

}

}
</style>


</head>

<body>

<header>

<h1><i class="fa-solid fa-utensils"></i> Food Paradise</h1>

<p>Fresh • Delicious • Fast Delivery</p>

</header>


<div class="container">

<h2 class="title">🍽 Food Menu</h2>

<div class="menu">

<div class="card">
<i class="fa-solid fa-burger food-icon"></i>

<h3>Burger</h3>

<p>₹120</p>

<label>

<input type="checkbox" class="item" data-name="Burger" data-price="120">

Select

</label>

<input type="number" class="qty" min="1" value="1">

</div>


<div class="card">

<i class="fa-solid fa-pizza-slice food-icon"></i>

<h3>Pizza</h3>

<p>₹250</p>

<label>

<input type="checkbox" class="item" data-name="Pizza" data-price="250">

Select

</label>

<input type="number" class="qty" min="1" value="1">

</div>


<div class="card">



<h3>Sandwich</h3>

<p>₹90</p>

<label>

<input type="checkbox" class="item" data-name="Sandwich" data-price="90">

Select

</label>

<input type="number" class="qty" min="1" value="1">

</div>


<div class="card">



<h3>Fries</h3>

<p>₹80</p>

<label>

<input type="checkbox" class="item" data-name="Fries" data-price="80">

Select

</label>

<input type="number" class="qty" min="1" value="1">

</div>


<div class="card">



<h3>Juice</h3>

<p>₹60</p>

<label>

<input type="checkbox" class="item" data-name="Juice" data-price="60">

Select

</label>

<input type="number" class="qty" min="1" value="1">

</div>

</div>



<h2 class="title">👤 Customer Details</h2>

<div class="form">

<input
type="text"
id="name"
placeholder="Enter Your Name">

<input
type="text"
id="mobile"
placeholder="Mobile Number">

<textarea
id="address"
placeholder="Address"></textarea>

<button onclick="placeOrder()">

<i class="fa-solid fa-cart-shopping"></i>

Place Order

</button>

</div>


<h2 class="title">🧾 Order Summary</h2>

<div id="summary">

Your Order Will Appear Here...

</div>


</div>

<script>function placeOrder() {

    let name = document.getElementById("name").value.trim();
    let mobile = document.getElementById("mobile").value.trim();
    let address = document.getElementById("address").value.trim();

    // Customer Validation
    if (name === "" || mobile === "" || address === "") {
        alert("⚠ Please fill all customer details.");
        return;
    }

    if (!/^[0-9]{10}$/.test(mobile)) {
        alert("⚠ Enter a valid 10-digit mobile number.");
        return;
    }

    let items = document.querySelectorAll(".item");
    let qty = document.querySelectorAll(".qty");

    let summary = "";
    let total = 0;
    let selected = false;

    summary += "🍽 FOOD PARADISE\n";
    summary += "========================\n\n";

    summary += "Customer : " + name + "\n";
    summary += "Mobile   : " + mobile + "\n";
    summary += "Address  : " + address + "\n\n";

    summary += "--------- ORDER ---------\n\n";

    for (let i = 0; i < items.length; i++) {

        if (items[i].checked) {

            selected = true;

            let itemName = items[i].dataset.name;
            let price = Number(items[i].dataset.price);
            let quantity = Number(qty[i].value);

            if (quantity <= 0) {
                quantity = 1;
            }

            let subtotal = price * quantity;
            total += subtotal;

            summary += itemName + " x " + quantity + " = ₹" + subtotal + "\n";
        }
    }

    if (!selected) {
        alert("🍔 Please select at least one food item.");
        return;
    }

    summary += "\n----------------------------\n";
    summary += "Grand Total : ₹" + total + "\n";
    summary += "----------------------------\n\n";

    summary += "🎉 Thank You For Ordering!\n";
    summary += "😊 Visit Again.";

    document.getElementById("summary").innerText = summary;

    // Success Popup
    alert("✅ Order Placed Successfully!");
}
</script>



</body>
</html>
